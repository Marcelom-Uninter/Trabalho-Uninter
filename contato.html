   <style>
      #btnInicio {
         position: fixed;

         cursor: pointer;
         font-size: 14px;
      }
      #btnInicio:hover {
         background-color: #1e7e34;
      }
   </style>

<script>
  // Seleciona o botão
  const btnTema = document.getElementById("theme-toggle");
